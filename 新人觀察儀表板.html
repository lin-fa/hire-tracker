<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主管儀表板 | 健·人餐廚</title>
<style>
:root{
  --brand:#C1614A;--dark:#8B3D28;--light:#F5EAE6;--mid:#E8A090;
  --bg:#FDF7F5;--s1:#fff;--s2:#fdf5f3;--s3:#f7ede9;--bd:#ecddd9;
  --t1:#2a1a15;--t2:#7a5a52;--t3:#b8958a;
  --red:#dc2626;--rbg:#fef2f2;--rbd:#fecaca;
  --ybg:#fffbeb;--yco:#92400e;--ybd:#fde68a;
  --gbg:#f0fdf4;--gco:#166534;--gbd:#bbf7d0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px}
.top{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:linear-gradient(135deg,var(--dark) 0%,var(--brand) 100%);position:sticky;top:0;z-index:100;gap:12px}
.logo{font-size:15px;font-weight:600;color:#fff}
.logo small{font-size:11px;color:rgba(255,255,255,.6);font-weight:400;margin-left:6px}
.live{font-size:11px;color:#fff;opacity:.8;display:flex;align-items:center;gap:4px}
.live::before{content:'';width:7px;height:7px;border-radius:50%;background:#fff;display:inline-block}
.tbr{display:flex;align-items:center;gap:8px}
.upd{font-size:11px;color:rgba(255,255,255,.55)}
.rbtn{padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;font-size:12px;cursor:pointer;font-family:inherit}
.rbtn:hover{background:rgba(255,255,255,.25)}
.xbtn{padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.2);color:#fff;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500}
.layout{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 52px)}
.sb{background:var(--s1);border-right:1px solid var(--bd);overflow-y:auto;padding:8px 0}
.main{overflow-y:auto;padding:20px 24px;background:var(--bg)}
.sblbl{font-size:10px;font-weight:600;letter-spacing:1px;color:var(--t3);text-transform:uppercase;padding:0 14px;margin:16px 0 6px}
.hi{padding:8px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;border-radius:8px;margin:0 6px 2px;transition:background .1s}
.hi:hover{background:var(--s2)}.hi.act{background:var(--light);outline:1px solid var(--mid)}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.hn{font-size:13px;font-weight:500;color:var(--t1)}.hs{font-size:11px;color:var(--t3);margin-top:1px}
.rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.mc{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px 18px}
.mv{font-size:28px;font-weight:600;line-height:1}.ml{font-size:12px;color:var(--t3);margin-top:5px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:18px 20px;margin-bottom:14px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ct{font-size:13px;font-weight:600;color:var(--t1)}.cs{font-size:11px;color:var(--t3)}
.alert{background:var(--rbg);border:1px solid var(--rbd);border-radius:10px;padding:14px 16px;margin-bottom:14px;display:flex;gap:10px}
.alert-body{font-size:13px;color:var(--red);line-height:1.7}
.alert-body strong{font-weight:600;display:block;margin-bottom:3px}
.advice{background:var(--light);border:1px solid var(--mid);border-radius:10px;padding:16px;margin-bottom:14px}
.adv-title{font-size:12px;font-weight:600;color:var(--dark);margin-bottom:12px}
.adv-item{display:flex;gap:10px;margin-bottom:10px;font-size:13px;color:var(--t1);line-height:1.6}
.adv-item:last-child{margin-bottom:0}
.abadge{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;flex-shrink:0;margin-top:2px;white-space:nowrap}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.sc{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center}
.sv{font-size:22px;font-weight:600;line-height:1}.sl{font-size:11px;color:var(--t3);margin-top:4px}
.tl{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tg{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:500}
.tr{background:var(--rbg);color:var(--red)}
.ty{background:var(--ybg);color:var(--yco)}
.tok{background:var(--light);color:var(--dark)}
.qb{background:var(--s2);border-left:3px solid var(--brand);padding:10px 14px;font-size:13px;color:var(--t1);line-height:1.7;margin-top:8px}
.wb{background:var(--light);border:1px solid var(--mid);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--dark);line-height:1.6;margin-top:8px}
.hrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd)}
.hrow:last-child{border-bottom:none}
.hday{font-size:12px;font-weight:500;width:46px;flex-shrink:0;color:var(--t2)}
.hbars{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.hbw{display:flex;flex-direction:column;gap:3px}
.hbl{font-size:10px;color:var(--t3)}
.hbb{height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.hbf{height:100%;border-radius:3px}
.hq{font-size:11px;width:72px;text-align:right;flex-shrink:0}
.cpcard{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:10px}
.cplbl{font-size:10px;font-weight:600;letter-spacing:1px;color:var(--t3);margin-bottom:8px;text-transform:uppercase}
.cprow{font-size:12px;color:var(--t1);margin-bottom:5px;display:flex;gap:8px}
.cpkey{color:var(--t3);flex-shrink:0;min-width:70px}
.div{height:1px;background:var(--bd);margin:14px 0}
.empty{text-align:center;padding:60px 20px;color:var(--t3);font-size:13px;line-height:2}
/* 主管留言區 */
.reply-box{background:linear-gradient(135deg,var(--dark),var(--brand));border-radius:12px;padding:16px 20px;margin-bottom:14px;color:#fff}
.reply-box .rt{font-size:12px;font-weight:600;opacity:.8;margin-bottom:10px}
.reply-box textarea{width:100%;padding:10px 12px;border-radius:8px;border:none;background:rgba(255,255,255,.15);color:#fff;font-family:inherit;font-size:13px;resize:none;min-height:72px;outline:none}
.reply-box textarea::placeholder{color:rgba(255,255,255,.5)}
.reply-box .send-btn{margin-top:8px;padding:7px 18px;border-radius:8px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.reply-box .send-btn:hover{background:rgba(255,255,255,.3)}
.reply-box .prev-reply{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.2);font-size:12px;opacity:.8;line-height:1.6}
.reply-box .prev-date{font-size:10px;opacity:.6;margin-top:3px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:320px;width:90%;text-align:center}
.modal h3{font-size:15px;font-weight:600;margin-bottom:8px}
.modal p{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:20px}
.modal-btns{display:flex;gap:10px}
.modal-btns button{flex:1;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit}
.cancel-btn{border:1px solid var(--bd);background:var(--s2);color:var(--t2)}
.del-btn{border:none;background:var(--red);color:#fff;font-weight:600}
@media(max-width:680px){.layout{grid-template-columns:1fr;height:auto}.mg{grid-template-columns:repeat(2,1fr)}.sg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- 登入頁 -->
<div id="login-page" style="min-height:100vh;background:linear-gradient(160deg,var(--dark) 0%,var(--brand) 65%,var(--mid) 100%);display:flex;align-items:center;justify-content:center;padding:1rem">
  <div style="background:#fff;border-radius:20px;padding:2rem 1.75rem;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(139,61,40,.2)">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:12px;letter-spacing:2px;color:var(--mid);margin-bottom:6px">健 · 人 餐 廚</div>
      <div style="font-size:18px;font-weight:700;color:var(--dark)">主管儀表板</div>
      <div style="font-size:13px;color:var(--t3);margin-top:4px">請選擇分店並輸入密碼</div>
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px">選擇分店</div>
      <select id="login-store" style="width:100%;padding:10px 12px;border:1.5px solid #ecddd9;border-radius:10px;font-size:14px;background:#fafafa;color:var(--t1);font-family:inherit;appearance:none">
        <option value="">請選擇…</option>
        <option value="巨蛋店">巨蛋店</option>
        <option value="中正店">中正店</option>
        <option value="四維店">四維店</option>
        <option value="澄清店">澄清店</option>
        <option value="文自店">文自店</option>
        <option value="榮總店">榮總店</option>
        <option value="三多店">三多店</option>
      </select>
    </div>
    <div style="margin-bottom:20px">
      <div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px">密碼</div>
      <input type="password" id="login-pw" placeholder="輸入分店密碼" style="width:100%;padding:10px 12px;border:1.5px solid #ecddd9;border-radius:10px;font-size:14px;background:#fafafa;color:var(--t1);font-family:inherit" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div id="login-err" style="color:#dc2626;font-size:12px;margin-bottom:12px;display:none;text-align:center">密碼錯誤，請再試一次</div>
    <button onclick="doLogin()" style="width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--dark),var(--brand));color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">登入</button>
  </div>
</div>

<!-- 主儀表板 -->
<div id="dashboard-page" style="display:none">
<div class="top">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo">健·人餐廚<small id="store-label">新人追蹤系統</small></div>
    <div class="live">● LIVE</div>
  </div>
  <div class="tbr">
    <span class="upd" id="upd">載入中…</span>
    <button class="xbtn" onclick="exportCSV()">↓ 匯出</button>
    <button class="rbtn" onclick="loadAll()">↻ 重新整理</button>
    <button class="rbtn" onclick="doLogout()">登出</button>
  </div>
</div>
<div class="modal-bg" id="del-modal">
  <div class="modal">
    <h3>確認刪除？</h3>
    <p id="del-msg"></p>
    <div class="modal-btns">
      <button class="cancel-btn" onclick="closeModal()">取消</button>
      <button class="del-btn" onclick="confirmDel()">確認刪除</button>
    </div>
  </div>
</div>
<div class="layout">
  <div class="sb">
    <div class="sblbl">新人列表</div>
    <div id="sb-list"><div style="padding:12px;font-size:12px;color:var(--t3)">載入中…</div></div>
  </div>
  <div class="main" id="main"><div class="empty">← 點選左側新人查看詳細分析</div></div>
</div>
</div><!-- end dashboard-page -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, where, limit, writeBatch, doc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";
const app=initializeApp({
  apiKey:"AIzaSyCl8kl4YW_ohHlhFTKNyQyQ-mZn1G7h9HM",
  authDomain:"hire-tracker-9e3fc.firebaseapp.com",
  projectId:"hire-tracker-9e3fc",
  storageBucket:"hire-tracker-9e3fc.firebasestorage.app",
  messagingSenderId:"799726433452",
  appId:"1:799726433452:web:f886d0bb4fc8e027215b09"
});
const db=getFirestore(app);
window._db=db;
window.loadAll=async function(){
  try{
    const daily=await getDocs(query(collection(db,'daily_checkins'),orderBy('timestamp','desc')));
    window._raw=daily.docs.map(d=>({id:d.id,...d.data()}));
    window._cp=[];
    renderAll(window._raw,[]);
    document.getElementById('upd').textContent='更新於 '+new Date().toLocaleTimeString('zh-TW');
  }catch(e){document.getElementById('main').innerHTML='<div class="empty">⚠️ 載入失敗<br>'+e.message+'</div>';}
};
window.deleteName=async function(name){
  const all=[...(window._raw||[]).filter(r=>r.name===name),...(window._cp||[]).filter(r=>r.name===name)];
  for(let i=0;i<all.length;i+=400){
    const batch=writeBatch(db);
    all.slice(i,i+400).forEach(r=>batch.delete(doc(db,r.formType==='checkpoint'?'checkpoint_surveys':'daily_checkins',r.id)));
    await batch.commit();
  }
};
window.sendReply=async function(name,store,message){
  await addDoc(collection(db,'manager_replies'),{
    name,store,message,
    date:new Date().toLocaleDateString('zh-TW'),
    timestamp:serverTimestamp()
  });
};
window.updateReply=async function(replyId,message){
  const {updateDoc}=await import('https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js');
  await updateDoc(doc(db,'manager_replies',replyId),{
    message,
    date:new Date().toLocaleDateString('zh-TW'),
    timestamp:serverTimestamp()
  });
};
window.deleteRecord=async function(recordId){
  const {deleteDoc}=await import('https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js');
  await deleteDoc(doc(db,'daily_checkins',recordId));
};
window.loadAllReplies=async function(name,store){
  try{
    const q=query(collection(db,'manager_replies'),where('name','==',name),where('store','==',store),orderBy('timestamp','desc'));
    const snap=await getDocs(q);
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){}
  return [];
};
window.loadAll();
</script>
<script>
let allH=[],allCP=[],pendingDel=null,currentStore=null;

// 分店密碼對照表
const storePW={
  '巨蛋店':'1111','中正店':'2222','四維店':'3333','澄清店':'4444',
  '文自店':'5555','榮總店':'6666','三多店':'7777'
};

function doLogin(){
  const store=document.getElementById('login-store').value;
  const pw=document.getElementById('login-pw').value;
  const err=document.getElementById('login-err');
  if(!store){err.textContent='請選擇分店';err.style.display='block';return;}
  if(storePW[store]!==pw){err.style.display='block';return;}
  err.style.display='none';
  currentStore=store;
  document.getElementById('login-page').style.display='none';
  document.getElementById('dashboard-page').style.display='block';
  document.getElementById('store-label').textContent=store;
  loadAll();
}

function doLogout(){
  currentStore=null;
  document.getElementById('dashboard-page').style.display='none';
  document.getElementById('login-page').style.display='flex';
  document.getElementById('login-pw').value='';
  document.getElementById('login-store').value='';
}
function avg(arr,k){const v=arr.filter(r=>r[k]>0).map(r=>r[k]);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;}
function riskOf(h){
  const s=(h.aM+h.aL+h.aC+h.aS)/4;
  // 新6選項：後三個才算高風險
  const highQuit=['認真想過，有一些原因','很認真在考慮，快決定了','已經決定要離職了'];
  const midQuit=['有想過，還在觀察'];
  const hasHighQ=h.records.some(r=>highQuit.includes(r.quit));
  const hasMidQ=h.records.some(r=>midQuit.includes(r.quit));
  const hasSig=h.records.some(r=>r.signals&&r.signals.length>0);
  if(h.aS<2||s<2.5||hasHighQ)return'high';
  if(s<3.3||hasSig||hasMidQ)return'mid';
  return'low';
}
function genTips(h,cp){
  const t=[],l=h.latest||{};
  if(h.aM<=2)t.push({u:'緊急',txt:'心情長期偏低（'+h.aM.toFixed(1)+'分），今天下班前主動找他談5分鐘，只聽不評判。'});
  else if(h.aM<=3)t.push({u:'關注',txt:'心情偏低，本週安排一次一對一，詢問有什麼可以幫的。'});
  if(h.aStress>=4)t.push({u:'緊急',txt:'壓力持續偏高（'+h.aStress.toFixed(1)+'分），確認工作量是否超出負荷，考慮調整班次。'});
  const ss=l.stressSrc||[];
  if(ss.includes('怕犯錯被罵'))t.push({u:'關注',txt:'反映「怕犯錯被罵」，本週多給正向回饋，犯錯時先問情況再說明，避免當眾責備。'});
  if(ss.includes('動作太慢'))t.push({u:'行動',txt:'對速度感到壓力，主動告訴他「速度慢慢來，先求正確」，給他信心。'});
  const q=l.quit||'';
  if(q==='已經決定要離職了')t.push({u:'緊急',txt:'夥伴表示已決定離職！今天立刻私下約談，了解原因，看是否有挽留空間。'});
  else if(q==='很認真在考慮，快決定了')t.push({u:'緊急',txt:'離職意願非常強烈，今天就找他私下談，主動了解主要原因。'});
  else if(q==='認真想過，有一些原因')t.push({u:'緊急',txt:'夥伴有認真考慮過離職，本週安排一對一，聽他說說原因。'});
  else if(q==='有想過，還在觀察')t.push({u:'關注',txt:'夥伴有離職念頭但還在觀察，本週找機會聊聊他對工作的感受和期待。'});
  else if(q==='偶爾閃過，但不嚴重')t.push({u:'行動',txt:'偶爾有離職念頭，屬正常範圍，持續給予正向回饋即可。'});
  if(h.aC<=2)t.push({u:'關注',txt:'人際融入度低，安排資深同事主動帶他，降低孤立感。'});
  if(l.conflict==='有，讓我很不舒服')t.push({u:'緊急',txt:'反映有讓他不舒服的人際互動，需私下詢問具體情況。'});
  if(l.support==='感覺被忽視')t.push({u:'關注',txt:'感覺被忽視，今天起每天開工時主動打招呼問候。'});
  if(l.dare==='很多，但不敢開口')t.push({u:'行動',txt:'有很多不懂的事但不敢問，安排每天10分鐘「問問題時間」。'});
  if(l.pace==='完全跟不上')t.push({u:'關注',txt:'完全跟不上節奏，考慮放慢步調重新帶起。'});
  const sigs=l.signals||[];
  if(sigs.includes('身體不舒服'))t.push({u:'緊急',txt:'反映身體不舒服，確認現在狀況，需要可讓他提早下班。'});
  if(sigs.includes('情緒很崩潰'))t.push({u:'緊急',txt:'情緒崩潰，找安靜地方讓他緩一緩，先陪著他。'});
  if(sigs.includes('被罵或指責'))t.push({u:'緊急',txt:'感覺委屈，私下了解情況，給予情緒支持。'});
  if(sigs.includes('想跟主管談'))t.push({u:'緊急',txt:'主動要求和主管談，今天務必找時間。'});
  const d7=cp.find(c=>c.day===7&&c.name===h.name);
  if(d7?.benefits==='跟說好的不一樣')t.push({u:'緊急',txt:'薪資或班表與承諾不符，需儘快確認說明。'});
  if(d7?.gap==='差很多，有點後悔')t.push({u:'關注',txt:'工作與期待落差大，直接問他「哪裡跟你想的不一樣」。'});
  if(t.length===0){t.push({u:'維持',txt:'目前各面向表現良好，持續給予正向回饋。'});t.push({u:'維持',txt:'適時給予更多挑戰，避免因重複性工作感到無聊。'});}
  return t;
}

function toggleDetail(id){

  const isOpen=el.style.display!=='none';
  el.style.display=isOpen?'none':'block';
  // 箭頭轉向
  const row=el.previousElementSibling;
  const arrow=row?.querySelector('span:last-child');

}
async function doSendReply(name){
  const msg=document.getElementById('reply-input')?.value.trim();
  if(!msg){alert('請輸入留言內容');return;}
  const btn=event.target;
  btn.disabled=true;btn.textContent='送出中…';
  try{
    await window.sendReply(name,currentStore,msg);
    btn.textContent='✓ 已送出';
    btn.style.background='rgba(255,255,255,.35)';
    document.getElementById('reply-input').value='';
    // 更新上次留言顯示
    const prev=document.querySelector('.prev-reply');
    if(prev){
      document.getElementById('prev-msg-text').textContent=msg;
    }
  }catch(e){
    alert('送出失敗，請再試一次');
    btn.disabled=false;btn.textContent='送出留言';
  }
}
async function editReply(replyId,name){
  const currentMsg=document.getElementById('prev-msg-text')?.textContent||'';
  const newMsg=prompt('修改留言內容：',currentMsg);
  if(!newMsg||newMsg.trim()===currentMsg)return;
  try{
    await window.updateReply(replyId,newMsg.trim());
    const el=document.getElementById('prev-msg-text');
    if(el)el.textContent=newMsg.trim();
    alert('留言已更新！');
  }catch(e){alert('更新失敗，請再試一次');}
}
let delRecordName=null;
function openDelRecord(name){
  delRecordName=name;
  const h=allH.find(x=>x.name===name);
  if(!h)return;
  const sorted=[...h.records].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const opts=sorted.map(r=>`<option value="${r.id}">${r.date||'未知日期'} · ${['😞','😕','😐','😊','😄'][r.mood-1]||''} 心情${r.mood||'?'}</option>`).join('');
  document.getElementById('del-msg').innerHTML=`選擇要刪除的填報紀錄：<br><br><select id="del-record-select" style="width:100%;padding:8px;border-radius:8px;border:1px solid #eee;margin-top:4px;font-size:13px">${opts}</select>`;
  document.getElementById('del-modal').classList.add('open');
}
function openDel(name){
  pendingDel=name;
  const h=allH.find(x=>x.name===name);
  document.getElementById('del-msg').textContent=`確定要刪除「${name}」的所有填報紀錄嗎？（共 ${h?h.records.length:0} 筆）此操作無法復原。`;
  document.getElementById('del-modal').classList.add('open');
}
function closeModal(){document.getElementById('del-modal').classList.remove('open');pendingDel=null;}
async function confirmDel(){
  // 判斷是刪整個人還是單筆
  const recordSelect=document.getElementById('del-record-select');
  if(recordSelect){
    // 刪單筆
    const recordId=recordSelect.value;
    if(!recordId){closeModal();return;}
    closeModal();
    try{
      await window.deleteRecord(recordId);
      await window.loadAll();
    }catch(e){alert('刪除失敗：'+e.message);}
  }else{
    // 刪整個人
    if(!pendingDel)return;
    const name=pendingDel;closeModal();
    try{await window.deleteName(name);await window.loadAll();}catch(e){alert('刪除失敗：'+e.message);}
  }
}
function exportCSV(){
  if(!window._raw||!window._raw.length){alert('目前沒有資料');return;}
  const rows=[['姓名','職位','天數','心情','壓力','人際','留任意願','離職念頭','壓力來源','緊急訊號','留言','時間']];
  window._raw.forEach(r=>rows.push([r.name||'',r.role||'',r.day||'',r.mood||'',r.stress||'',r.collab||'',r.stay||'',r.quit||'',(r.stressSrc||[]).join('、'),(r.signals||[]).join('、'),r.msg||'',r.timestamp?.toDate?.().toLocaleString('zh-TW')||'']));
  const csv='\uFEFF'+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='新人填報_'+new Date().toLocaleDateString('zh-TW')+'.csv';a.click();
}
</script>
